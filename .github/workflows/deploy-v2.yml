name: Build & deploy v2 React app

on:
  push:
    branches: [main]
    paths:
      - 'piso-libro-v2/**'

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: piso-libro-v2/package-lock.json

      - name: Install
        run: npm ci
        working-directory: piso-libro-v2

      - name: Build
        run: npm run build
        working-directory: piso-libro-v2

      - name: Copy dist → v2/
        run: |
          rm -rf v2
          cp -r piso-libro-v2/dist v2

      - name: Commit built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/
          git diff --cached --quiet || git commit -m "chore(v2): rebuild dist [skip ci]"
          git push
