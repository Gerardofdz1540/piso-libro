name: WinLab Scraper (Visita Medica 14:00)

# WinLab publica labs a distintas horas. Corremos 3 veces al dia (León = CST,
# UTC-6, sin horario de verano). Todos los dias (incluye fines de semana por
# guardias). Si no hay labs nuevos, el upsert reescribe la misma data, no rompe.
#   04:00 León = 10:00 UTC  (labs de la madrugada / nocturnos)
#   13:15 León = 19:15 UTC  (visita medica — run principal)
#   20:00 León = 02:00 UTC  (labs de la tarde/noche)
# Nota: GitHub puede retrasar los cron unos minutos en horas pico.
on:
  schedule:
    - cron: "0 10 * * *"   # 04:00 León
    - cron: "15 19 * * *"  # 13:15 León (visita)
    - cron: "0 2 * * *"    # 20:00 León
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — recorre WinLab completo pero NO escribe en Supabase. Úsalo para verificar que el scraper encuentra los labs correctamente."
        required: false
        default: false
        type: boolean

concurrency:
  group: winlab-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: rpa

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # El cron dispara desde main (rama por defecto), pero el codigo vivo del
          # scraper (rpa/) y la app estan en feature/winlab-auto-sync. Checkout de
          # feature -> una sola fuente de verdad, sin divergencia rpa entre ramas.
          ref: feature/winlab-auto-sync

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: rpa/package.json

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ${{ steps.pw-cache.outputs.cache-hit == 'true' && '1' || '0' }}
        run: npm install --no-audit --no-fund

      - name: Tests offline (dedup, filtros, fechas)
        run: node scraper.test.js

      - name: Ensure Chromium present
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run scraper (con reintentos)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 85
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on: error
          command: cd rpa && npm run scrape
        env:
          WINLAB_URL:               ${{ secrets.WINLAB_URL }}
          WINLAB_USER:              ${{ secrets.WINLAB_USER }}
          WINLAB_PASS:              ${{ secrets.WINLAB_PASS }}
          WINLAB_RESULTS_URL:       ${{ secrets.WINLAB_RESULTS_URL }}
          WINLAB_USER_SELECTOR:     ${{ secrets.WINLAB_USER_SELECTOR }}
          WINLAB_PASS_SELECTOR:     ${{ secrets.WINLAB_PASS_SELECTOR }}
          WINLAB_SUBMIT_SELECTOR:   ${{ secrets.WINLAB_SUBMIT_SELECTOR }}
          WINLAB_TABLE_SELECTOR:    ${{ secrets.WINLAB_TABLE_SELECTOR }}
          WINLAB_LOGGED_SELECTOR:   ${{ secrets.WINLAB_LOGGED_SELECTOR }}
          WINLAB_NEXT_SELECTOR:     ${{ secrets.WINLAB_NEXT_SELECTOR }}
          # Pestaña de temporalidad: selector del tab "Por Temporalidad" (opcional).
          WL_TEMPORALIDAD_TAB_SEL:  ${{ secrets.WL_TEMPORALIDAD_TAB_SEL }}
          # Dropdown "Profilo Consultazione" (default: AYER Y HOY) — fix validado PR #116.
          WL_PROFILO_SEL:           ${{ secrets.WL_PROFILO_SEL }}
          WL_PROFILO_VALUE:         ${{ secrets.WL_PROFILO_VALUE }}
          # Días de lookback para el rango de fechas (default: 2 = HOY + AYER).
          WL_LOOKBACK_DAYS:         ${{ secrets.WL_LOOKBACK_DAYS }}
          # Drilldown: descargar hasta N PDFs por paciente. 4→16→12 (15 jun 2026):
          # WinLab guarda CADA panel como referto SEPARADO (BH, química, hepática, coags...).
          # Con 4 la QS/hepática quedaba sin drillear. 16 fue demasiado: el presupuesto
          # por-paciente (90s) no alcanzaba para 16 drills y abandonaba pacientes. 12 cubre
          # BH+QS+hepática+coags de varios días y entra en 90s. El targeting limita a los
          # reportes del OBJETIVO. Esta env OVERRIDE pisa el default del código.
          WL_DRILLDOWN_MAX:         "12"
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_TABLE:           ${{ secrets.SUPABASE_TABLE }}
          SUPABASE_ON_CONFLICT:     ${{ secrets.SUPABASE_ON_CONFLICT }}
          DRY_RUN:                  ${{ inputs.dry_run || 'false' }}

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: |
            rpa/failure-*.png
            rpa/explorer-*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify failure (GitHub envia email automaticamente)
        if: failure()
        run: |
          echo "::error title=WinLab Scraper FAIL::El scraping fallo tras 3 intentos. Revisa el log y el artifact de screenshot."
          exit 1
